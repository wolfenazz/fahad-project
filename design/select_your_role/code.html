<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Your Role - foodTracksBH</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0150b",
                        "primary-light": "#fcecea",
                        "background-light": "#ffffff",
                        "background-dark": "#1a1110",
                        "surface-light": "#f8f9fa",
                        "surface-dark": "#2a1e1d",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Custom radio logic for selection visualization without JS */
        input[type="radio"]:checked + div {
            border-color: #e0150b;
            background-color: #fcecea;
        }
        input[type="radio"]:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        input[type="radio"]:checked + div .icon-box {
            background-color: #e0150b;
            color: white;
        }
        
        /* Dark mode overrides for checked state */
        .dark input[type="radio"]:checked + div {
            background-color: #3a1513; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<!-- Header Content -->
<div class="px-6 pt-4 pb-6">
<h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-3xl font-extrabold leading-tight mb-3">
                Join foodTracksBH
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium leading-relaxed">
                Choose how you want to use the app to get started with your journey.
            </p>
</div>
<!-- Main Form -->
<form class="flex-1 flex flex-col px-6 gap-5">
<!-- Option 1: Customer -->
<label class="group cursor-pointer relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="customer"/>
<div class="flex flex-col items-start p-5 rounded-2xl border-2 border-transparent bg-surface-light dark:bg-surface-dark shadow-sm transition-all duration-300 hover:shadow-md hover:bg-slate-100 dark:hover:bg-[#332524]">
<!-- Header Row inside Card -->
<div class="flex w-full justify-between items-start mb-4">
<div class="icon-box size-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center transition-colors duration-300">
<span class="material-symbols-outlined text-2xl">restaurant</span>
</div>
<div class="check-icon opacity-0 scale-75 transition-all duration-300 text-primary">
<span class="material-symbols-outlined filled text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">I'm a Customer</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 font-medium leading-relaxed">
                        Discover Bahrain's best street food and find top-rated food trucks near you.
                    </p>
</div>
</label>
<!-- Option 2: Vendor -->
<label class="group cursor-pointer relative">
<input class="peer sr-only" name="role" type="radio" value="vendor"/>
<div class="flex flex-col items-start p-5 rounded-2xl border-2 border-transparent bg-surface-light dark:bg-surface-dark shadow-sm transition-all duration-300 hover:shadow-md hover:bg-slate-100 dark:hover:bg-[#332524]">
<!-- Header Row inside Card -->
<div class="flex w-full justify-between items-start mb-4">
<div class="icon-box size-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center transition-colors duration-300">
<span class="material-symbols-outlined text-2xl">local_shipping</span>
</div>
<div class="check-icon opacity-0 scale-75 transition-all duration-300 text-primary">
<span class="material-symbols-outlined filled text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">I own a Food Truck</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 font-medium leading-relaxed">
                        Manage your truck, track daily sales, and expand your customer reach easily.
                    </p>
</div>
</label>
<!-- Spacer to push button to bottom on tall screens -->
<div class="flex-grow"></div>
<!-- Action Area -->
<div class="pb-8 pt-4">
<button class="w-full flex items-center justify-center h-14 bg-primary hover:bg-red-700 text-white font-bold text-lg rounded-2xl transition-transform active:scale-[0.98] shadow-lg shadow-primary/30" type="button">
                    Continue
                </button>
<div class="mt-6 text-center">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">
                        Already have an account? 
                        <a class="text-primary hover:text-red-700 font-bold ml-1 transition-colors" href="#">Log in</a>
</p>
</div>
</div>
</form>
</div>
</body></html>
