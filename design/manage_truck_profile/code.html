<div class="space-y-4">
<div class="space-y-1.5">

</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-text-main flex justify-between" for="bio">
<span>Description</span>
<span class="text-xs font-normal text-text-sub">48/150</span>
</label>
<textarea class="w-full p-4 bg-surface-light border-transparent rounded-lg focus:border-primary focus:bg-white focus:ring-0 transition-colors text-base placeholder:text-text-sub/50 resize-none" id="bio" placeholder="Tell foodies what makes your truck special..." rows="4">Best smash burgers in Bahrain! 🍔🇧🇭 Fresh ingredients daily.</textarea>

</div>
</div>

<span class="material-symbols-outlined">cloud_upload</span>
</div>
<p class="text-sm font-semibold text-text-main">Click to upload menu</p>
<p class="text-xs text-text-sub mt-1">PDF, PNG or JPG (Max 5MB)</p>
</div>

</div>

</div>
